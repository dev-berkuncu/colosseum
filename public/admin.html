<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colosseum Admin Paneli</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f5; margin:0; padding:0; color:#18181b; }
  .container { max-width: 800px; margin: 40px auto; padding: 20px; }
  .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.1); margin-bottom: 24px; }
  h1, h2 { margin-top:0; font-weight: 600; }
  input, textarea, select { width: 100%; padding: 10px; margin: 8px 0 16px 0; border: 1px solid #d4d4d8; border-radius: 6px; box-sizing: border-box; font-family:inherit; }
  button { background: #18181b; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: 500; font-size:14px; }
  button:hover { background: #3f3f46; }
  button.danger { background: #ef4444; padding: 6px 12px; font-size: 12px; }
  button.danger:hover { background: #dc2626; }
  
  #login-section { max-width: 400px; margin: 100px auto; text-align:center; }
  #dashboard-section { display: none; }
  
  .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e4e4e7; }
  .list-item:last-child { border-bottom: none; }
  .item-title { font-weight: 600; }
  .item-meta { font-size: 0.85rem; color: #71717a; margin-top: 4px; }
  
  .header-bar { display:flex; justify-content: space-between; align-items:center; margin-bottom:24px; }
  .logout-btn { background: #e4e4e7; color:#18181b; }
  .logout-btn:hover { background: #d4d4d8; }
</style>
</head>
<body>

<div id="login-section" class="card">
  <h2>Colosseum Giriş</h2>
  <div id="login-err" style="color:red; margin-bottom:10px; font-size:14px;"></div>
  <input type="text" id="username" placeholder="Kullanıcı Adı">
  <input type="password" id="password" placeholder="Şifre">
  <button onclick="login()" style="width:100%">Giriş Yap</button>
</div>

<div id="dashboard-section" class="container">
  <div class="header-bar">
    <h1>Yönetim Paneli</h1>
    <div>
      <a href="/" target="_blank" style="margin-right:15px; color:#52525b; text-decoration:none;">Siteye Git ↗</a>
      <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </div>
  </div>

  <div class="card">
    <h2>Yeni Proje Ekle</h2>
    <p style="font-size:14px; color:#52525b; margin-top:-10px;">YouTube videonuzu ve detayları ekleyerek portfolyoda görünmesini sağlayın.</p>
    
    <label>Başlık</label>
    <input type="text" id="p-title" placeholder="Örn: Kapadokya Tanıtımı">
    
    <label>Kategori</label>
    <input type="text" id="p-tag" placeholder="Örn: Belgesel">
    
    <label>YouTube Linki</label>
    <input type="text" id="p-video" placeholder="https://www.youtube.com/watch?v=...">
    
    <label>Açıklama</label>
    <textarea id="p-desc" rows="3" placeholder="Proje hakkında kısa bilgi..."></textarea>
    
    <button onclick="addProject(event)">Projeyi Ekle</button>
  </div>

  <div class="card">
    <h2>Mevcut Projeler</h2>
    <div id="projects-list">Yükleniyor...</div>
  </div>
  
  <div class="card">
    <h2>Site Ayarları</h2>
    <label>Ana Başlık</label>
    <input type="text" id="s-title">
    
    <label>Alt Başlık</label>
    <input type="text" id="s-sub">
    
    <label>İletişim E-Posta</label>
    <input type="text" id="s-email">
    
    <label>İletişim Telefon</label>
    <input type="text" id="s-phone">
    
    <button onclick="saveSettings(event)">Ayarları Kaydet</button>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
